        - path: "OrderService.Tests/OrderService.Tests.csproj"
          source: "fixtures/nunit-untagged/OrderService.Tests/OrderService.Tests.csproj"
        - path: "OrderService.Tests/OrderProcessorTests.cs"
          source: "fixtures/nunit-untagged/OrderService.Tests/OrderProcessorTests.cs"
        - path: "OrderService/OrderService.csproj"
          source: "fixtures/nunit-untagged/OrderService/OrderService.csproj"
        - path: "OrderService/Order.cs"
          source: "fixtures/nunit-untagged/OrderService/Order.cs"
        - path: "OrderService/OrderProcessor.cs"
          source: "fixtures/nunit-untagged/OrderService/OrderProcessor.cs"
    assertions:
      - type: file_contains
        path: "OrderService.Tests/OrderProcessorTests.cs"
